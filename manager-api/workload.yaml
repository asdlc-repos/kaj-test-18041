apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: manager-api

endpoints:
  - name: http
    type: HTTP
    port: 9090
    basePath: /
    visibility:
      - external

dependencies:
  endpoints:
    - component: leave-api
      name: http
      visibility: project
      envBindings:
        address: LEAVE_API_URL
